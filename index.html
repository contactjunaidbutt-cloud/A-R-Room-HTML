    function header(){return `<header class="site-header"><div class="wrap"><div class="nav-shell"><button class="text-btn" onclick="showPage('landing')">${logo()}</button><nav class="nav-links"><button onclick="scrollToId('how')">How it works</button><button onclick="scrollToId('experts')">Industry experts</button><button onclick="scrollToId('pricing')">Experiences</button><button onclick="showPage('reviewer')">Expert workspace</button></nav><div class="nav-actions"><button class="btn btn-secondary" onclick="showPage('dashboard')">Dashboard</button><button class="btn btn-primary" onclick="showPage('upload')">Submit a track &rarr;</button></div><button class="menu-btn" aria-label="Menu" onclick="toggleMenu()">MENU</button></div><div id="mobileMenu" class="mobile-menu"><button onclick="scrollToId('how')">How it works</button><button onclick="scrollToId('experts')">Industry experts</button><button onclick="scrollToId('pricing')">Experiences</button><button onclick="showPage('reviewer')">Expert workspace</button><button onclick="showPage('dashboard')">Artist dashboard</button><button onclick="showPage('upload')">Submit a track</button></div></div></header>`}
    function landing(){return `<div class="page">${header()}<section class="hero"><div class="hero-bg"></div><div class="wrap hero-grid"><div><span class="eyebrow">South Asian-led private A&amp;R network</span><h1>Your music. <span class="gradient">Industry ears.</span></h1><p class="lead">Develop your music with established South Asian artists, producers, songwriters and engineers who understand the sound, culture and global audience.</p><div class="hero-actions"><button class="btn btn-primary" onclick="showPage('upload')">Develop your track &rarr;</button><button class="btn btn-secondary" onclick="scrollToId('how')">Enter the room</button></div><div class="trust"><div class="avatars">${reviewers.slice(0,4).map(r=>`<span class="avatar">${r.initials}</span>`).join("")}</div><div><div class="stars">FOUNDED AND LED BY THE INDUSTRY</div><p>Built by the people behind the music. Created for the artists coming next.</p></div></div></div><div class="hero-art"><div class="player-card"><div class="player-top"><div><div class="player-title">Private artist development</div><div class="small">Confidential - unreleased music</div></div><button class="play" onclick="this.textContent=this.textContent==='PLAY'?'STOP':'PLAY'">PLAY</button></div>${wave()}<div class="score-mini"><div><b>8.8</b><span>Identity</span></div><div><b>8.5</b><span>Culture</span></div><div><b>9.1</b><span>Crossover</span></div></div></div></div></div></section>
      <section class="positioning"><div class="wrap positioning-row"><div class="positioning-mark">What this is</div><div class="positioning-copy"><b>Not playlist pitching. Not paid promotion.</b> Private, structured artist development from credible South Asian music makers.</div><button class="btn btn-secondary" onclick="scrollToId('standard')">See our standard &rarr;</button></div></section>
      <section id="how" class="section"><div class="wrap"><div class="section-head center"><div class="kicker">Controlled access. Serious guidance.</div><h2>From submission to a stronger record.</h2><p class="section-copy">Industry experts release a limited number of private development slots, protecting their time and the quality of every response.</p></div><div class="grid-4">${[["01","Submit","Share the record, its cultural context and the decision you need to make."],["02","Select Expert","Choose a credible music maker aligned with your sound and ambition."],["03","Receive Analysis","Get structured creative, technical and market-specific direction."],["04","Develop Your Sound","Apply the priorities, upload a revision and track your progress."]].map(x=>`<article class="card"><div class="icon-box">${x[0]}</div><div class="step-no">STEP ${x[0]}</div><h3>${x[1]}</h3><p>${x[2]}</p></article>`).join("")}</div></div></section>
      <section class="section alt"><div class="wrap"><article class="card founder-panel"><div class="founder-grid"><div class="founder-message"><div class="kicker">Founded by the industry</div><h2>Standards designed by people who make records.</h2><p class="section-copy">A&amp;R ROOM is created with and launched by established professionals from South Asian music. That means the culture, the artist and the unreleased work are understood from inside the industry, not observed from outside it.</p><div class="quote">Built by the people behind the music. Created for the artists coming next.</div></div><div class="founder-proof">${[["01","Immediate credibility","A trusted environment led by recognised music professionals."],["02","Authentic understanding","Creative guidance shaped by lived cultural and industry experience."],["03","Trusted unreleased music","Private submissions, protected contact details and controlled access."],["04","Industry-made standards","Every report is built around the decisions real records require."],["05","A stronger network","Credible founders attract credible experts and serious emerging artists."]].map(x=>`<div class="proof-row"><span class="proof-icon">${x[0]}</span><div><b>${x[1]}</b><p>${x[2]}</p></div></div>`).join("")}</div></div></article></div></section>
      <section id="experts" class="section"><div class="wrap"><div class="section-head"><div class="kicker">Music makers, not curators</div><h2>Develop your music with people who helped shape the sound.</h2><p class="section-copy">Successful artists, hit producers, songwriters, vocal producers, mix and mastering engineers, influential DJs and selected A&amp;R professionals. You are paying for creative and technical development, never consideration for a playlist or blog.</p></div><div class="grid-3">${reviewers.slice(0,3).map(r=>reviewerCard(r)).join("")}</div><div style="margin-top:28px;text-align:right"><button class="btn btn-secondary" onclick="showPage('experts')">View available experts &rarr;</button></div></div></section>
      <section class="section alt"><div class="wrap"><div class="section-head center"><div class="kicker">Cultural intelligence</div><h2>South Asian music needs more than generic pop criteria.</h2><p class="section-copy">The right feedback understands the language, musical lineage, audience and cultural choices inside the record.</p></div><div class="culture-grid"><article class="card culture-card"><div class="icon-box">LANG</div><h3>Language, lyric and performance</h3><p>Guidance that can recognise lyrical nuance, vocal ornamentation, pronunciation, emotion and family or cultural sensitivities.</p><div class="tags"><span class="tag">Punjabi</span><span class="tag">Hindi</span><span class="tag">Urdu</span><span class="tag">Bengali</span><span class="tag">Regional languages</span></div></article><article class="card culture-card"><div class="icon-box">SOUND</div><h3>Tradition inside modern production</h3><p>An ear for authenticity when Bhangra, Bollywood, Qawwali and regional influences meet R&amp;B, hip-hop, pop and electronic production.</p><div class="tags"><span class="tag">Dhol</span><span class="tag">Tabla</span><span class="tag">Tumbi</span><span class="tag">Melodic tradition</span><span class="tag">Urban Desi</span></div></article><article class="card culture-card"><div class="icon-box">WORLD</div><h3>Domestic and global audiences</h3><p>Perspective across South Asia and its diaspora, including whether a crossover choice feels natural, forced or commercially unclear.</p><div class="tags"><span class="tag">UK</span><span class="tag">India</span><span class="tag">Pakistan</span><span class="tag">Canada</span><span class="tag">US</span><span class="tag">Global diaspora</span></div></article></div></div></section>
      <section class="section"><div class="wrap"><div class="section-head center"><div class="kicker">Why enter the room</div><h2>Credible ears. Clearer decisions.</h2></div><div class="grid-2"><article class="card"><div class="icon-box">ART</div><h3>For emerging artists</h3><ul class="benefit-list"><li>Be properly heard by a recognised South Asian industry name.</li><li>Understand whether the record is creatively, culturally and commercially competitive.</li><li>Receive context generic music-feedback platforms cannot provide.</li><li>Find the priority issues before investing in visuals, marketing or release.</li><li>Keep an artist-development history across revised song versions.</li></ul><div class="quote">&ldquo;Someone credible has finally listened properly to my music.&rdquo;</div></article><article class="card"><div class="icon-box">PRO</div><h3>For industry experts</h3><ul class="benefit-list"><li>Set pricing, availability and limited monthly capacity.</li><li>Receive organised, culturally relevant submissions instead of unsolicited DMs.</li><li>Keep contact details private with files, payments and support managed centrally.</li><li>Help shape the next generation while protecting your time and reputation.</li><li>Earn 80% of each completed review with no obligation to collaborate.</li></ul><div class="notice">Experts are paid for their time and professional analysis, never for positive feedback or promised opportunities.</div></article></div></div></section>
      <section id="pricing" class="section alt"><div class="wrap"><div class="section-head center"><div class="kicker">One-off private experiences</div><h2>Choose how deeply they listen.</h2><p class="section-copy">No subscription required. Every format follows the A&amp;R ROOM development standard. Prices may vary by expert and availability.</p></div><div class="grid-3">${[["Written Expert Report","149.99","Structured guidance you can revisit while developing the record.",["Cultural and creative analysis","Full development scorecard","Timestamped observations","Three priority improvements"]],["Personal Voice Feedback","199.99","Hear the expert's instinct, nuance and creative direction directly.",["Everything in Written","Personal voice response","Deeper cultural context","Recommended next step"]],["Personal Video Feedback","249.99","A complete, personal walkthrough of the track and its potential.",["Everything in Voice","Visual track walkthrough","Detailed section analysis","Release-focused direction"]]].map((p,i)=>`<article class="card price-card ${i===1?"featured":""}"><div class="icon-box">0${i+1}</div><h3>${p[0]}</h3><p>${p[2]}</p><div class="price-value"><span class="small">From </span>&pound;${p[1]}</div><ul class="features">${p[3].map(f=>`<li>${f}</li>`).join("")}</ul><button class="btn ${i===1?"btn-primary":"btn-secondary"}" style="width:100%;margin-top:18px" onclick="showPage('upload')">Find an expert</button></article>`).join("")}</div></div></section>
      <section id="standard" class="section"><div class="wrap"><div class="section-head center"><div class="kicker">The A&amp;R ROOM development standard</div><h2>More than a response. A properly structured analysis.</h2><p class="section-copy">Every completed review turns professional instinct into clear creative priorities and a practical next move.</p></div><div class="framework-strip">${[["01","Songwriting &amp; structure","Does the record hold attention and deliver its idea?"],["02","Vocal delivery","Tone, emotion, phrasing, language and performance."],["03","Production","Arrangement, musical choices and sonic identity."],["04","Mix &amp; master","Balance, translation, impact and technical readiness."],["05","Artist identity","Is the artist distinctive, believable and memorable?"],["06","Cultural authenticity","Do the South Asian choices feel informed and natural?"],["07","Domestic potential","How could the record connect in its core markets?"],["08","Global crossover","Can it travel without losing what makes it authentic?"],["09","Three priorities","The most important improvements to make next."],["10","Recommended next step","A clear development or release-readiness decision."]].map(x=>`<div class="framework-item"><div class="step-no">${x[0]}</div><b>${x[1]}</b><span>${x[2]}</span></div>`).join("")}</div></div></section>
      <section class="section alt"><div class="wrap"><div class="section-head center"><div class="kicker">Controlled celebrity access</div><h2>A private studio listening session, not an open marketplace.</h2><p class="section-copy">The prestige comes from real boundaries that protect both the artist and the industry expert.</p></div><div class="access-grid">${[["Limited monthly drops","Experts decide when and how many private slots become available."],["Confidential submissions","Unreleased music is presented inside a controlled development workflow."],["No exposed contact details","A&amp;R ROOM manages communication, support and delivery."],["No open inbox","Artists submit a professional brief rather than sending unsolicited messages."],["No bidding","Experts are selected for relevance, not placed in a race to the lowest price."],["No public competition","Tracks and scores remain part of the artist's private development history."],["No forced opportunity","A review creates no obligation to sign, introduce or collaborate."],["Expert-controlled participation","Profiles, formats, availability and pricing require expert or management approval."]].map(x=>`<div class="access-item"><b>${x[0]}</b>${x[1]}</div>`).join("")}</div></div></section>
      <section class="section"><div class="wrap"><div class="section-head center"><div class="kicker">Built around serious development</div><h2>One expert or a complete industry panel.</h2></div><div class="grid-2"><article class="card"><div class="role">Core experience</div><h3>Expert Review</h3><p>One chosen music professional provides structured written, voice or video development across the creative, cultural, technical and commercial decisions that matter.</p><button class="btn btn-secondary space" onclick="showPage('upload')">Submit for expert review</button></article><article class="card"><div class="role">Coming soon</div><h3>Three-Expert Industry Panel</h3><p>Three complementary perspectives on one record: an artist, a producer or songwriter, and a mix or mastering engineer.</p><button class="btn btn-secondary space" disabled>Join the panel waitlist</button></article></div></div></section>
      <section class="section" style="padding-top:20px"><div class="wrap cta"><div class="kicker">The private South Asian A&amp;R network</div><h2>Your next version starts inside the room.</h2><p class="section-copy">A&amp;R ROOM connects emerging talent with the established South Asian music professionals shaping the culture.</p><button class="btn btn-primary" onclick="showPage('upload')">View available development slots &rarr;</button></div></section><footer><div class="wrap footer-row">${logo()}<div class="footer-note">Static prototype only. No payments or uploads are processed. Sample expert profiles are used for demonstration and do not imply endorsement. Feedback never guarantees a signing, collaboration, placement or introduction.</div></div></footer></div>`}
    function appTop(title){return `<div class="app-top"><div class="wrap"><button class="back" onclick="showPage('landing')">&larr; Home</button><strong>${title}</strong><span></span></div></div>`}
    function upload(){return `<div class="page">${appTop("Private track submission")}<main class="app-main"><div class="wrap"><div class="kicker">Step 01 / Professional A&amp;R brief</div><h1 class="app-title">Prepare the room.</h1><p class="section-copy">Give your chosen industry expert the musical, cultural and market context they need to listen with purpose.</p><div class="form-layout"><form class="panel" onsubmit="event.preventDefault();showPage('experts')"><div class="form-grid"><label><span class="field-label">Song title</span><input class="field" value="Midnight Rani" required></label><label><span class="field-label">Artist name</span><input class="field" value="Jay Kaden" required></label></div><div class="form-grid space"><label><span class="field-label">Primary genre</span><select class="field"><option>Urban Desi</option><option>R&B</option><option>Pop</option><option>Bhangra</option><option>Hip-Hop</option><option>Bollywood</option><option>Qawwali / Sufi</option><option>Regional fusion</option></select></label><label><span class="field-label">Song language</span><select class="field"><option>Punjabi / English</option><option>Punjabi</option><option>Hindi</option><option>Urdu</option><option>Bengali</option><option>English</option><option>Other / Multilingual</option></select></label></div><div class="form-grid space"><label><span class="field-label">Primary audience</span><select class="field"><option>UK South Asian diaspora</option><option>India</option><option>Pakistan</option><option>Canada</option><option>United States</option><option>Global diaspora</option><option>International crossover</option></select></label><label><span class="field-label">Current production stage</span><select class="field"><option>Production in progress</option><option>Demo</option><option>Pre-mix</option><option>Final mix</option><option>Mastered / release candidate</option></select></label></div><div class="space"><span class="field-label">Private MP3 or WAV</span><label class="drop"><input type="file" accept="audio/*" hidden onchange="document.getElementById('fileName').textContent=this.files[0]?.name||'Drop your track here'"><span><b id="fileName">Drop your unreleased track here</b><br><span class="small">Confidential submission - demo only</span></span></label></div><div class="space"><span class="field-label">Where do you need industry guidance?</span><div class="choice-grid">${["Songwriting and structure","Vocals and performance","Production, mix and master","Identity, culture and market potential"].map((c,i)=>`<button type="button" class="choice ${i===0?"active":""}" onclick="choose(this)">${c}</button>`).join("")}</div></div><label class="space" style="display:block"><span class="field-label">Cultural and creative context</span><textarea class="field" rows="4" placeholder="Which traditions, regions, instruments, vocal styles or lyrical sensitivities should the expert understand?"></textarea></label><label class="space" style="display:block"><span class="field-label">Private brief for the expert</span><textarea class="field" rows="5" placeholder="What decision are you trying to make, who is the record for and what reference tracks matter?"></textarea></label><div class="notice space">Your submission remains private. Purchasing development feedback does not guarantee a signing, collaboration, introduction, placement or further contact with the expert.</div><button class="btn btn-primary space" type="submit">View available music professionals &rarr;</button></form><aside class="panel"><div class="icon-box">A&amp;R</div><h3>Make their listening time count.</h3><p class="section-copy" style="font-size:13px">A professional brief helps the expert understand both the record you made and the audience you want it to reach.</p><ul class="features"><li>Mention language and lyrical context</li><li>Share reference tracks and production stage</li><li>Name the core and crossover audiences</li><li>Explain the cultural choices that matter</li><li>Identify the decisions you are stuck on</li></ul><div class="quote" style="font-size:13px">The better the context, the more precise the development advice.</div></aside></div></div></main></div>`}
    function experts(filter="All"){let list=filter==="All"?reviewers:reviewers.filter(r=>(r.disciplines||[r.role]).includes(filter));return `<div class="page">${appTop("Select an industry expert")}<main class="app-main"><div class="wrap"><div class="kicker">Step 02 / Limited development drop</div><h1 class="app-title">Choose the right industry ears.</h1><p class="section-copy">These are active music makers, not playlist gatekeepers. Each expert controls their availability and accepts a limited number of private development reviews.</p><div class="filters">${["All","Producer","Artist","Songwriter","Vocal Producer","Mix Engineer","DJ"].map(f=>`<button class="filter ${filter===f?"active":""}" onclick="renderExperts('${f}')">${f==='All'?'All experts':f+'s'}</button>`).join("")}</div><div class="grid-3">${list.map(r=>reviewerCard(r,true)).join("")}</div><div class="notice space">All profiles in this static prototype are sample profiles only. Participation, profile language, availability and pricing require direct expert or management approval.</div></div></main></div>`}
    function payment(){let upgrade=selectedFeedback==="Written"?0:selectedFeedback==="Voice"?50:100,total=selectedReviewer.price+upgrade;return `<div class="page">${appTop("Review private order")}<main class="app-main"><div class="wrap"><div class="kicker">Final step</div><h1 class="app-title">Reserve the expert's time.</h1><p class="section-copy">One-off payment. No subscription required. Every format follows the A&amp;R ROOM development standard.</p><div class="checkout-layout"><section class="panel"><h3>Choose your development experience</h3>${[["Written","Written Expert Report","Structured cultural, creative and commercial analysis","Included"],["Voice","Personal Voice Feedback","Written report plus a personal voice response","+ &pound;50.00"],["Video","Personal Video Feedback","A complete personal walkthrough","+ &pound;100.00"]].map(x=>`<button class="choice ${selectedFeedback===x[0]?"active":""}" style="width:100%;margin-top:10px" onclick="selectFeedback('${x[0]}')"><b>${x[1]}</b><span class="small" style="display:block">${x[2]} - ${x[3]}</span></button>`).join("")}<div class="notice space">The expert is paid for private professional development analysis, not for positive feedback, playlist consideration or a promised industry opportunity.</div></section><aside class="panel"><div style="display:flex;gap:14px;align-items:center"><div class="reviewer-avatar" style="width:52px;height:52px;font-size:13px">${selectedReviewer.initials}</div><div><b>${selectedReviewer.name}</b><div class="role">Featured Industry Expert / ${selectedReviewer.title||selectedReviewer.role}</div></div></div><div class="space"><div class="summary-row"><span>Track title</span><b>Midnight Rani</b></div><div class="summary-row"><span>Artist</span><b>Jay Kaden</b></div><div class="summary-row"><span>Experience</span><b>${selectedFeedback} Feedback</b></div><div class="summary-row"><span>Development standard</span><b>A&amp;R ROOM</b></div><div class="summary-row"><span>Turnaround</span><b>${selectedReviewer.turn}</b></div><div class="summary-row"><span>Expert review</span><b>&pound;${money(selectedReviewer.price)}</b></div><div class="summary-row"><span>Format upgrade</span><b>&pound;${money(upgrade)}</b></div><div class="summary-row total"><span>Total</span><b>&pound;${money(total)}</b></div></div><button class="btn btn-primary" style="width:100%;margin-top:20px" onclick="showPage('dashboard')">Secure checkout</button><p class="small" style="text-align:center">Secure payment powered by Stripe - demo only.</p></aside></div></div></main></div>`}
    function dashboard(){return `<div class="page">${appTop("Artist dashboard")}<main class="app-main"><div class="wrap"><div style="display:flex;justify-content:space-between;align-items:end;gap:20px"><div><div class="kicker">Private artist room</div><h1 class="app-title">Welcome back, Jay.</h1><p class="section-copy">Your development history, expert feedback and revised versions live here.</p></div><button class="btn btn-primary" onclick="showPage('upload')">Submit new track</button></div><div class="stats"><div class="stat"><b>2</b><span>Active expert reviews</span></div><div class="stat"><b>8</b><span>Completed</span></div><div class="stat"><b>8.6</b><span>Average score</span></div><div class="stat"><b>2</b><span>Revised versions</span></div></div><h2 style="font-size:24px">Your private submissions</h2><div class="grid-2" style="margin-top:20px">${tracks.map(t=>`<article class="card"><div class="icon-box">MIX</div><h3>${t.title}</h3><p>${t.genre} - 03:26</p><span class="status ${t.status==='Completed'?'completed':t.status==='In Review'?'reviewing':t.status==='Pending Payment'?'pending':'draft'}">${t.status}</span><div class="track-actions"><div><span class="small">Industry expert</span><br><b style="font-size:12px">${t.reviewer}</b></div><button class="btn btn-secondary" onclick="${t.status==='Completed'?"showPage('report')":t.status==='Pending Payment'?"showPage('payment')":"showPage('upload')"}">${t.action}</button></div>${t.status==='Completed'?`<button class="choice" style="width:100%;margin-top:12px;text-align:center" onclick="showPage('upload')">Upload revised version for comparison</button>`:""}</article>`).join("")}</div></div></main></div>`}
    function reviewerDashboard(){return `<div class="page">${appTop("Industry expert workspace")}<main class="app-main"><div class="wrap"><div class="kicker">Private expert workspace</div><h1 class="app-title">Good afternoon, Mumzy.</h1><p class="section-copy">Control your availability, protect your time and deliver the A&amp;R ROOM development standard privately.</p><div class="stats"><div class="stat"><b>04</b><span>Pending tracks</span></div><div class="stat"><b>02</b><span>In progress</span></div><div class="stat"><b>3 / 8</b><span>Monthly slots remaining</span></div><div class="stat"><b>&pound;1,599</b><span>Estimated 80% payout</span></div></div><div class="grid-3" style="margin-top:0;margin-bottom:26px"><div class="panel"><span class="field-label">Accepting submissions</span><button class="choice active" style="width:100%">Available this month</button></div><div class="panel"><span class="field-label">Written report price</span><div class="field">&pound;149.99</div></div><div class="panel"><span class="field-label">Monthly capacity</span><div class="field">8 private reviews</div></div></div><div class="review-layout"><aside class="panel"><h3>Private development queue</h3>${tracks.slice(0,3).map((t,i)=>`<div class="queue-item ${i===0?"active":""}"><b style="font-size:12px">${t.title}</b><div class="small">Jay Kaden - ${t.genre}</div></div>`).join("")}<div class="notice space">Artist contact details remain private. There is no obligation to sign, collaborate with or contact an artist after delivery.</div></aside><section class="panel"><span class="status reviewing">In progress</span><h2 style="font-size:27px">Midnight Rani</h2><p class="small">Punjabi / English - UK diaspora - Personal video feedback</p>${wave(55)}<div class="grid-2" style="margin-top:20px"><div><h3>A&amp;R ROOM scorecard</h3>${[["Songwriting & Structure",84],["Vocal Delivery",88],["Production",85],["Mix & Master",81],["Artist Identity",89],["Cultural Authenticity",92],["Domestic Market Potential",86],["Global Crossover Potential",91]].map(s=>`<div class="score-row"><div class="score-label"><span>${s[0]}</span><b>${s[1]/10}</b></div><div class="bar"><i style="width:${s[1]}%"></i></div></div>`).join("")}</div><div><h3>Professional analysis</h3><textarea class="field" rows="8">The core of this record is strong. The Punjabi and English phrasing feels natural, the vocal tone is distinctive and the dhol is integrated into the production rather than added as decoration. Create more contrast between the verse and chorus without losing that identity.</textarea><label class="space" style="display:block"><span class="field-label">Cultural and market perspective</span><textarea class="field" rows="5">The record feels credible for the UK South Asian audience and has crossover potential because the hook communicates before every lyric is understood. Keep the Punjabi melodic character central rather than smoothing it away.</textarea></label><label class="space" style="display:block"><span class="field-label">Timestamped observation</span><input class="field" value="00:47 - Strong hook. Open the dhol layer wider here."></label><label class="space" style="display:block"><span class="field-label">Three priority improvements</span><textarea class="field" rows="4">1. Create more chorus contrast\n2. Carve the low mids\n3. Strengthen the final ad-lib</textarea></label><label class="space" style="display:block"><span class="field-label">Recommended next step</span><input class="field" value="Complete one focused mix revision before mastering."></label><div class="hero-actions"><button class="btn btn-secondary">Save draft</button><button class="btn btn-primary" onclick="showPage('report')">Submit private review</button></div></div></div></section></div></div></main></div>`}
    function report(){let notes=[["00:18","Bring the first vocal phrase forward by around 1 dB."],["00:47","Strong hook. Open the dhol layer wider here."],["01:36","Carve a little low mid between the bass and keys."],["02:42","Add one fresh ad-lib in the final chorus."]];return `<div class="page">${appTop("Private development report")}<main class="app-main"><div class="wrap"><div class="kicker">A&amp;R ROOM development standard completed</div><div style="display:flex;justify-content:space-between;align-items:end;gap:20px"><div><h1 class="app-title">Your industry analysis is in.</h1><p class="section-copy">Midnight Rani - Punjabi / English - UK diaspora - 11 June 2026</p></div><button class="btn btn-primary" onclick="showPage('upload')">Upload revised version</button></div><div class="report-layout"><div><section class="panel" style="background:linear-gradient(135deg,rgba(236,72,153,.1),rgba(139,92,246,.04))"><div class="kicker">Overall development score</div><div class="overall">8.7</div><p class="section-copy">A distinctive and culturally credible record with a memorable hook, strong diaspora potential and three focused production decisions left before release.</p></section><section class="panel space"><h2 style="font-size:23px">First impression and professional analysis</h2><p class="section-copy">The core of this record is strong. The hook is memorable after one listen and your vocal tone gives it a clear identity. The Punjabi and English phrasing feels natural, and the South Asian musical elements are integrated into the production rather than placed on top.</p><p class="section-copy">For the next mix, create more contrast between the verse and chorus. A slightly drier, narrower verse would make the hook feel bigger without adding more layers or weakening the melodic character.</p></section><section class="panel space"><h2 style="font-size:23px">Cultural and market perspective</h2><p class="section-copy"><b style="color:#fff">Cultural authenticity:</b> The melodic phrasing and dhol choices feel informed rather than decorative. Keep the Punjabi identity central to the final mix.</p><p class="section-copy"><b style="color:#fff">Domestic and diaspora potential:</b> The record is best positioned initially for UK and Canadian South Asian audiences, where its hybrid production language will feel immediately familiar.</p><p class="section-copy"><b style="color:#fff">Global crossover potential:</b> The hook communicates emotionally before every lyric is understood. Resist replacing its most culturally specific choices merely to make it feel more international.</p></section><section class="panel space"><h2 style="font-size:23px">Timestamped observations</h2>${notes.map(n=>`<div class="time-note"><span class="time">${n[0]}</span><span class="muted">${n[1]}</span></div>`).join("")}</section><section class="panel space"><div class="kicker">Recommended next step</div><h3>Complete one focused mix revision before mastering.</h3><p class="section-copy">Prioritise contrast, low-mid separation and the final vocal lift. Do not add more production layers until those three decisions are resolved.</p></section></div><aside><section class="panel"><h3>A&amp;R ROOM scorecard</h3>${[["Songwriting & Structure",84],["Vocal Delivery",88],["Production",85],["Mix & Master",81],["Artist Identity",89],["Cultural Authenticity",92],["Domestic Market Potential",86],["Global Crossover Potential",91]].map(s=>`<div class="score-row"><div class="score-label"><span>${s[0]}</span><b>${s[1]/10}</b></div><div class="bar"><i style="width:${s[1]}%"></i></div></div>`).join("")}</section><section class="panel space"><h3>Three priority improvements</h3><ul class="features"><li>Create more verse-to-chorus contrast</li><li>Carve 250-350 Hz before mastering</li><li>Add one distinctive final ad-lib</li></ul></section><section class="panel space"><div class="kicker">Development status</div><h3>Nearly release ready</h3><p class="section-copy" style="font-size:12px">One focused revision is recommended before final mastering and release preparation.</p></section><section class="notice space">This private report provides professional opinion and artist-development guidance. It does not guarantee playlist support, promotion, a signing, collaboration, placement or introduction.</section></aside></div></div></main></div>`}
    function showPage(name){window.scrollTo(0,0);if(name==='landing')app.innerHTML=landing();if(name==='upload')app.innerHTML=upload();if(name==='experts')app.innerHTML=experts();if(name==='payment')app.innerHTML=payment();if(name==='dashboard')app.innerHTML=dashboard();if(name==='reviewer')app.innerHTML=reviewerDashboard();if(name==='report')app.innerHTML=report()}
    function selectExpert(name){selectedReviewer=reviewers.find(r=>r.name===name)||reviewers[0];showPage('payment')}
    function selectFeedback(type){selectedFeedback=type;showPage('payment')}
    function renderExperts(role){app.innerHTML=experts(role)}
    function choose(el){el.parentElement.querySelectorAll('.choice').forEach(x=>x.classList.remove('active'));el.classList.add('active')}
    function toggleMenu(){document.getElementById('mobileMenu')?.classList.toggle('open')}
    function scrollToId(id){if(!document.getElementById(id)){showPage('landing');setTimeout(()=>document.getElementById(id)?.scrollIntoView({behavior:'smooth'}),50)}else document.getElementById(id).scrollIntoView({behavior:'smooth'});document.getElementById('mobileMenu')?.classList.remove('open')}
    showPage('landing');
  </script>
