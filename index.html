<body>
  <div id="app"></div>
  <script>
    const reviewers=[
      {name:"Mumzy Stranger",initials:"MS",role:"Artist",genres:["R&B","Pop","Urban Desi"],price:149.99,rating:4.9,turn:"Up to 7 days",slots:3},
      {name:"Rishi Rich",initials:"RR",role:"Producer",genres:["R&B","Bhangra","Pop"],price:199.99,rating:5.0,turn:"Up to 7 days",slots:2},
      {name:"Dr Zeus",initials:"DZ",role:"Producer",genres:["Bhangra","Hip-Hop","Fusion"],price:199.99,rating:4.9,turn:"Up to 7 days",slots:4},
      {name:"PBN",initials:"PBN",role:"Producer",genres:["Bhangra","Dance","Punjabi"],price:149.99,rating:4.8,turn:"Up to 7 days",slots:5},
      {name:"DJ Lyan",initials:"DL",role:"DJ",genres:["Club","Afrobeats","Desi"],price:149.99,rating:4.8,turn:"Up to 7 days",slots:3},
      {name:"Roach Killa",initials:"RK",role:"Artist",genres:["Dancehall","Reggae","Urban"],price:149.99,rating:4.9,turn:"Up to 7 days",slots:2}
    ];
    const tracks=[
      {title:"Midnight Rani",genre:"Urban Desi",status:"Completed",reviewer:"Mumzy Stranger",action:"View feedback"},
      {title:"Tere Naal Again",genre:"R&B / Pop",status:"In Review",reviewer:"Rishi Rich",action:"Continue"},
      {title:"Brown Frequency",genre:"Bhangra",status:"Pending Payment",reviewer:"PBN",action:"Pay now"},
      {title:"Voice Note 07",genre:"Pop",status:"Draft",reviewer:"Not selected",action:"Continue"}
    ];
    let selectedReviewer=reviewers[0];
    let selectedFeedback="Voice";
    const app=document.getElementById("app");
    function logo(){return `<span class="logo"><span class="logo-mark"><i></i><i></i><i></i><i></i><i></i></span><span><span class="logo-name">A&amp;R ROOM&trade;</span><span class="logo-tag">Your music. Industry ears.</span></span></span>`}
    function wave(count=42){return `<div class="wave">${Array.from({length:count},(_,i)=>`<i style="height:${18+(i*19)%58}%"></i>`).join("")}</div>`}
    function money(value){return Number(value).toFixed(2)}
    function reviewerCard(r,select=false){return `<article class="card reviewer-card" data-role="${r.role}"><div class="reviewer-top"><div class="reviewer-avatar">${r.initials}</div><span class="rating">&#9733; ${r.rating.toFixed(1)}</span></div><h3>${r.name}</h3><div class="role">Featured Industry Expert / ${r.role}</div><div class="tags">${r.genres.map(g=>`<span class="tag">${g}</span>`).join("")}</div><div class="slots">${r.slots} review slots available this month</div><div class="review-meta"><div class="price"><small>Written report from</small>&pound;${money(r.price)}</div><button class="btn btn-primary" onclick="selectExpert('${r.name.replaceAll("'","\\'")}')">${select?"Select expert":"View profile"} &rarr;</button></div></article>`}
    function header(){return `<header class="site-header"><div class="wrap"><div class="nav-shell"><button class="text-btn" onclick="showPage('landing')">${logo()}</button><nav class="nav-links"><button onclick="scrollToId('how')">How it works</button><button onclick="scrollToId('experts')">Industry experts</button><button onclick="scrollToId('pricing')">Experiences</button><button onclick="showPage('reviewer')">Expert workspace</button></nav><div class="nav-actions"><button class="btn btn-secondary" onclick="showPage('dashboard')">Dashboard</button><button class="btn btn-primary" onclick="showPage('upload')">Submit a track &rarr;</button></div><button class="menu-btn" aria-label="Menu" onclick="toggleMenu()">MENU</button></div><div id="mobileMenu" class="mobile-menu"><button onclick="scrollToId('how')">How it works</button><button onclick="scrollToId('experts')">Industry experts</button><button onclick="scrollToId('pricing')">Experiences</button><button onclick="showPage('reviewer')">Expert workspace</button><button onclick="showPage('dashboard')">Artist dashboard</button><button onclick="showPage('upload')">Submit a track</button></div></div></header>`}
    function landing(){return `<div class="page">${header()}<section class="hero"><div class="hero-bg"></div><div class="wrap hero-grid"><div><span class="eyebrow">Private digital A&amp;R network</span><h1>Your music. <span class="gradient">Industry ears.</span></h1><p class="lead">Private, professional feedback from established South Asian artists, producers, songwriters and engineers. Controlled access to the people artists rarely get the chance to reach.</p><div class="hero-actions"><button class="btn btn-primary" onclick="showPage('upload')">Submit your track &rarr;</button><button class="btn btn-secondary" onclick="scrollToId('how')">How it works</button></div><div class="trust"><div class="avatars">${reviewers.slice(0,4).map(r=>`<span class="avatar">${r.initials}</span>`).join("")}</div><div><div class="stars">PRIVATE / CULTURALLY INFORMED / PRACTICAL</div><p>Built for serious independent artists preparing their next release.</p></div></div></div><div class="hero-art"><div class="player-card"><div class="player-top"><div><div class="player-title">Private industry review</div><div class="small">Confidential - unreleased music</div></div><button class="play" onclick="this.textContent=this.textContent==='PLAY'?'STOP':'PLAY'">PLAY</button></div>${wave()}<div class="score-mini"><div><b>8.8</b><span>Identity</span></div><div><b>8.2</b><span>Production</span></div><div><b>9.1</b><span>Potential</span></div></div></div></div></div></section>
      <section id="how" class="section"><div class="wrap"><div class="section-head center"><div class="kicker">Controlled access. Serious guidance.</div><h2>From submission to a stronger record.</h2><p class="section-copy">Experts release a limited number of private review slots each month, protecting their time and the quality of every response.</p></div><div class="grid-4">${[["01","Submit","Send your finished track or work in progress privately."],["02","Select Expert","Choose an available industry expert aligned with your sound."],["03","Receive Feedback","Receive structured, practical guidance in your chosen format."],["04","Improve Your Sound","Apply the priorities and return with a stronger version."]].map(x=>`<article class="card"><div class="icon-box">${x[0]}</div><div class="step-no">STEP ${x[0]}</div><h3>${x[1]}</h3><p>${x[2]}</p></article>`).join("")}</div></div></section>
      <section id="experts" class="section alt"><div class="wrap"><div class="section-head"><div class="kicker">Featured industry experts</div><h2>Access that cannot be found in your inbox.</h2><p class="section-copy">Recognised South Asian music professionals offering culturally informed guidance across songwriting, performance, production, mix and global crossover potential.</p></div><div class="grid-3">${reviewers.slice(0,3).map(r=>reviewerCard(r)).join("")}</div><div style="margin-top:28px;text-align:right"><button class="btn btn-secondary" onclick="showPage('experts')">View available experts &rarr;</button></div></div></section>
      <section class="section"><div class="wrap"><div class="section-head center"><div class="kicker">Why enter the room</div><h2>Credible ears. Clearer decisions.</h2></div><div class="grid-2"><article class="card"><div class="icon-box">ART</div><h3>For emerging artists</h3><ul class="benefit-list"><li>Be properly heard by a recognised industry name.</li><li>Understand whether the song is creatively and commercially competitive.</li><li>Get South Asian and global crossover insight unavailable from generic feedback.</li><li>Find the priority issues before spending on visuals, marketing or release.</li><li>Upload a revised version and measure the improvement.</li></ul><div class="quote">&ldquo;Someone credible has finally listened properly to my music.&rdquo;</div></article><article class="card"><div class="icon-box">PRO</div><h3>For industry experts</h3><ul class="benefit-list"><li>Set pricing, availability and limited monthly capacity.</li><li>Receive organised, relevant submissions instead of unsolicited DMs.</li><li>Keep contact details private with files, payments and support managed centrally.</li><li>Discover exceptional emerging talent without any obligation to collaborate.</li><li>Earn 80% of each completed review while A&amp;R ROOM handles administration.</li></ul><div class="notice">Experts are paid for their time and professional analysis, never for positive feedback or promised opportunities.</div></article></div></div></section>
      <section id="pricing" class="section alt"><div class="wrap"><div class="section-head center"><div class="kicker">One-off private experiences</div><h2>Choose how deeply they listen.</h2><p class="section-copy">No subscription required. Prices may vary by expert, demand and availability.</p></div><div class="grid-3">${[["Written Expert Report","149.99","Structured guidance you can revisit while developing the record.",["First impression and identity","Full score breakdown","Timestamped observations","Three priority improvements"]],["Personal Voice Feedback","199.99","Hear the expert's instinct, nuance and creative direction directly.",["Everything in Written","Personal voice response","Deeper creative context","Recommended next step"]],["Personal Video Feedback","249.99","A complete, personal walkthrough of the track and its potential.",["Everything in Voice","Visual track walkthrough","Detailed section analysis","Release-focused direction"]]].map((p,i)=>`<article class="card price-card ${i===1?"featured":""}"><div class="icon-box">0${i+1}</div><h3>${p[0]}</h3><p>${p[2]}</p><div class="price-value"><span class="small">From </span>&pound;${p[1]}</div><ul class="features">${p[3].map(f=>`<li>${f}</li>`).join("")}</ul><button class="btn ${i===1?"btn-primary":"btn-secondary"}" style="width:100%;margin-top:18px" onclick="showPage('upload')">Find an expert</button></article>`).join("")}</div></div></section>
      <section class="section"><div class="wrap"><div class="section-head center"><div class="kicker">Built around serious development</div><h2>One expert or a complete industry panel.</h2></div><div class="grid-2"><article class="card"><div class="role">Core experience</div><h3>Expert Review</h3><p>One chosen professional provides structured written, voice or video feedback across the creative and commercial decisions that matter.</p><button class="btn btn-secondary space" onclick="showPage('upload')">Submit for expert review</button></article><article class="card"><div class="role">Coming soon</div><h3>Three-Expert Industry Panel</h3><p>Three complementary perspectives on one record: an artist, a producer or songwriter, and a mix or mastering engineer.</p><button class="btn btn-secondary space" disabled>Join the panel waitlist</button></article></div></div></section>
      <section class="section" style="padding-top:20px"><div class="wrap cta"><div class="kicker">Limited monthly availability</div><h2>Your next version starts inside the room.</h2><p class="section-copy">Bring the track. Choose a credible perspective. Leave knowing what deserves your attention next.</p><button class="btn btn-primary" onclick="showPage('upload')">View available slots &rarr;</button></div></section><footer><div class="wrap footer-row">${logo()}<div class="footer-note">Static prototype only. No payments or uploads are processed. Sample expert profiles are used for demonstration and do not imply endorsement. Feedback never guarantees a signing, collaboration, placement or introduction.</div></div></footer></div>`}
    function appTop(title){return `<div class="app-top"><div class="wrap"><button class="back" onclick="showPage('landing')">&larr; Home</button><strong>${title}</strong><span></span></div></div>`}
    function upload(){return `<div class="page">${appTop("Private track submission")}<main class="app-main"><div class="wrap"><div class="kicker">Step 01</div><h1 class="app-title">Prepare the room.</h1><p class="section-copy">Give your chosen industry expert the context they need to listen with purpose.</p><div class="form-layout"><form class="panel" onsubmit="event.preventDefault();showPage('experts')"><div class="form-grid"><label><span class="field-label">Song title</span><input class="field" value="Midnight Rani" required></label><label><span class="field-label">Artist name</span><input class="field" value="Jay Kaden" required></label></div><label class="space" style="display:block"><span class="field-label">Genre</span><select class="field"><option>Urban Desi</option><option>R&B</option><option>Pop</option><option>Bhangra</option><option>Hip-Hop</option></select></label><div class="space"><span class="field-label">Private MP3 or WAV</span><label class="drop"><input type="file" accept="audio/*" hidden onchange="document.getElementById('fileName').textContent=this.files[0]?.name||'Drop your track here'"><span><b id="fileName">Drop your unreleased track here</b><br><span class="small">Confidential submission - demo only</span></span></label></div><div class="space"><span class="field-label">Where do you need industry guidance?</span><div class="choice-grid">${["Songwriting and structure","Vocals and performance","Production, mix and master","Identity and commercial potential"].map((c,i)=>`<button type="button" class="choice ${i===0?"active":""}" onclick="choose(this)">${c}</button>`).join("")}</div></div><label class="space" style="display:block"><span class="field-label">Private brief for the expert</span><textarea class="field" rows="5" placeholder="What stage is the record at, and what decision are you trying to make?"></textarea></label><div class="notice space">Your submission remains private. Purchasing feedback does not guarantee a signing, collaboration, introduction, placement or further contact with the expert.</div><button class="btn btn-primary space" type="submit">View available industry experts &rarr;</button></form><aside class="panel"><div class="icon-box">TIP</div><h3>Make their listening time count.</h3><p class="section-copy" style="font-size:13px">Explain the decision you are facing, not simply whether you think the song is good.</p><ul class="features"><li>Mention reference tracks</li><li>Share the production stage</li><li>Describe your intended audience</li><li>Name the decisions you are stuck on</li></ul></aside></div></div></main></div>`}
    function experts(filter="All"){let list=filter==="All"?reviewers:reviewers.filter(r=>r.role===filter);return `<div class="page">${appTop("Select an industry expert")}<main class="app-main"><div class="wrap"><div class="kicker">Step 02 / Limited monthly drop</div><h1 class="app-title">Choose the right industry ears.</h1><p class="section-copy">Each expert controls their availability and accepts a limited number of private reviews. Select the perspective closest to your next decision.</p><div class="filters">${["All","Producer","Artist","DJ"].map(f=>`<button class="filter ${filter===f?"active":""}" onclick="renderExperts('${f}')">${f==='All'?'All experts':f+'s'}</button>`).join("")}</div><div class="grid-3">${list.map(r=>reviewerCard(r,true)).join("")}</div><div class="notice space">All profiles in this static prototype are sample profiles only. Availability, pricing and participation require direct expert or management approval.</div></div></main></div>`}
    function payment(){let upgrade=selectedFeedback==="Written"?0:selectedFeedback==="Voice"?50:100,total=selectedReviewer.price+upgrade;return `<div class="page">${appTop("Review private order")}<main class="app-main"><div class="wrap"><div class="kicker">Final step</div><h1 class="app-title">Reserve the expert's time.</h1><p class="section-copy">One-off payment. No subscription required. This checkout is a visual demo only.</p><div class="checkout-layout"><section class="panel"><h3>Choose your feedback experience</h3>${[["Written","Written Expert Report","Structured report, scores and timestamps","Included"],["Voice","Personal Voice Feedback","Written report plus a personal voice response","+ &pound;50.00"],["Video","Personal Video Feedback","A complete personal walkthrough","+ &pound;100.00"]].map(x=>`<button class="choice ${selectedFeedback===x[0]?"active":""}" style="width:100%;margin-top:10px" onclick="selectFeedback('${x[0]}')"><b>${x[1]}</b><span class="small" style="display:block">${x[2]} - ${x[3]}</span></button>`).join("")}<div class="notice space">The expert is paid for private professional analysis, not for positive feedback or a promised industry opportunity.</div></section><aside class="panel"><div style="display:flex;gap:14px;align-items:center"><div class="reviewer-avatar" style="width:52px;height:52px;font-size:13px">${selectedReviewer.initials}</div><div><b>${selectedReviewer.name}</b><div class="role">Featured Industry Expert / ${selectedReviewer.role}</div></div></div><div class="space"><div class="summary-row"><span>Track title</span><b>Midnight Rani</b></div><div class="summary-row"><span>Artist</span><b>Jay Kaden</b></div><div class="summary-row"><span>Experience</span><b>${selectedFeedback} Feedback</b></div><div class="summary-row"><span>Turnaround</span><b>${selectedReviewer.turn}</b></div><div class="summary-row"><span>Expert review</span><b>&pound;${money(selectedReviewer.price)}</b></div><div class="summary-row"><span>Format upgrade</span><b>&pound;${money(upgrade)}</b></div><div class="summary-row total"><span>Total</span><b>&pound;${money(total)}</b></div></div><button class="btn btn-primary" style="width:100%;margin-top:20px" onclick="showPage('dashboard')">Secure checkout</button><p class="small" style="text-align:center">Secure payment powered by Stripe - demo only.</p></aside></div></div></main></div>`}
    function dashboard(){return `<div class="page">${appTop("Artist dashboard")}<main class="app-main"><div class="wrap"><div style="display:flex;justify-content:space-between;align-items:end;gap:20px"><div><div class="kicker">Private artist room</div><h1 class="app-title">Welcome back, Jay.</h1><p class="section-copy">Your development history, expert feedback and revised versions live here.</p></div><button class="btn btn-primary" onclick="showPage('upload')">Submit new track</button></div><div class="stats"><div class="stat"><b>2</b><span>Active expert reviews</span></div><div class="stat"><b>8</b><span>Completed</span></div><div class="stat"><b>8.6</b><span>Average score</span></div><div class="stat"><b>2</b><span>Revised versions</span></div></div><h2 style="font-size:24px">Your private submissions</h2><div class="grid-2" style="margin-top:20px">${tracks.map(t=>`<article class="card"><div class="icon-box">MIX</div><h3>${t.title}</h3><p>${t.genre} - 03:26</p><span class="status ${t.status==='Completed'?'completed':t.status==='In Review'?'reviewing':t.status==='Pending Payment'?'pending':'draft'}">${t.status}</span><div class="track-actions"><div><span class="small">Industry expert</span><br><b style="font-size:12px">${t.reviewer}</b></div><button class="btn btn-secondary" onclick="${t.status==='Completed'?"showPage('report')":t.status==='Pending Payment'?"showPage('payment')":"showPage('upload')"}">${t.action}</button></div>${t.status==='Completed'?`<button class="choice" style="width:100%;margin-top:12px;text-align:center" onclick="showPage('upload')">Upload revised version for comparison</button>`:""}</article>`).join("")}</div></div></main></div>`}
    function reviewerDashboard(){return `<div class="page">${appTop("Industry expert workspace")}<main class="app-main"><div class="wrap"><div class="kicker">Private expert workspace</div><h1 class="app-title">Good afternoon, Mumzy.</h1><p class="section-copy">Control your availability, protect your time and deliver structured feedback privately.</p><div class="stats"><div class="stat"><b>04</b><span>Pending tracks</span></div><div class="stat"><b>02</b><span>In progress</span></div><div class="stat"><b>3 / 8</b><span>Monthly slots remaining</span></div><div class="stat"><b>&pound;1,599</b><span>Estimated 80% payout</span></div></div><div class="grid-3" style="margin-top:0;margin-bottom:26px"><div class="panel"><span class="field-label">Accepting submissions</span><button class="choice active" style="width:100%">Available this month</button></div><div class="panel"><span class="field-label">Written report price</span><div class="field">&pound;149.99</div></div><div class="panel"><span class="field-label">Monthly capacity</span><div class="field">8 private reviews</div></div></div><div class="review-layout"><aside class="panel"><h3>Private review queue</h3>${tracks.slice(0,3).map((t,i)=>`<div class="queue-item ${i===0?"active":""}"><b style="font-size:12px">${t.title}</b><div class="small">Jay Kaden - ${t.genre}</div></div>`).join("")}<div class="notice space">Artist contact details remain private. There is no obligation to sign, collaborate with or contact an artist after delivery.</div></aside><section class="panel"><span class="status reviewing">In progress</span><h2 style="font-size:27px">Midnight Rani</h2><p class="small">Jay Kaden - Urban Desi - Personal video feedback</p>${wave(55)}<div class="grid-2" style="margin-top:20px"><div><h3>Structured scorecard</h3>${[["Songwriting",84],["Vocal",88],["Production",85],["Mix",82],["Master",78],["Artist Identity",89],["Commercial Potential",91]].map(s=>`<div class="score-row"><div class="score-label"><span>${s[0]}</span><b>${s[1]/10}</b></div><div class="bar"><i style="width:${s[1]}%"></i></div></div>`).join("")}</div><div><h3>Professional analysis</h3><textarea class="field" rows="7">The core of this record is strong. Your hook is memorable and the vocal tone feels distinctive. Focus the next pass on creating more contrast between the verse and chorus.</textarea><label class="space" style="display:block"><span class="field-label">Timestamped observation</span><input class="field" value="00:47 - Strong hook. Open the dhol layer wider here."></label><label class="space" style="display:block"><span class="field-label">Three priority improvements</span><textarea class="field" rows="4">1. Create more chorus contrast\n2. Carve the low mids\n3. Strengthen the final ad-lib</textarea></label><label class="space" style="display:block"><span class="field-label">Recommended next step</span><input class="field" value="Complete one focused mix revision before mastering."></label><div class="hero-actions"><button class="btn btn-secondary">Save draft</button><button class="btn btn-primary" onclick="showPage('report')">Submit private review</button></div></div></div></section></div></div></main></div>`}
    function report(){let notes=[["00:18","Bring the first vocal phrase forward by around 1 dB."],["00:47","Strong hook. Open the dhol layer wider here."],["01:36","Carve a little low mid between the bass and keys."],["02:42","Add one fresh ad-lib in the final chorus."]];return `<div class="page">${appTop("Private expert report")}<main class="app-main"><div class="wrap"><div class="kicker">Industry expert review completed</div><div style="display:flex;justify-content:space-between;align-items:end;gap:20px"><div><h1 class="app-title">Your feedback is in.</h1><p class="section-copy">Midnight Rani - Private review completed 11 June 2026</p></div><button class="btn btn-primary" onclick="showPage('upload')">Upload revised version</button></div><div class="report-layout"><div><section class="panel" style="background:linear-gradient(135deg,rgba(236,72,153,.1),rgba(139,92,246,.04))"><div class="kicker">Overall industry score</div><div class="overall">8.6</div><p class="section-copy">A distinctive, commercially promising record with a memorable hook and a few focused production decisions left to make.</p></section><section class="panel space"><h2 style="font-size:23px">First impression and professional analysis</h2><p class="section-copy">The core of this record is strong. The hook is memorable after one listen and your vocal tone gives it a clear identity. The South Asian elements feel integrated into the production rather than added on top.</p><p class="section-copy">For the next mix, create more contrast between the verse and chorus. A slightly drier, narrower verse would make the hook feel bigger without adding more layers.</p></section><section class="panel space"><h2 style="font-size:23px">Timestamped observations</h2>${notes.map(n=>`<div class="time-note"><span class="time">${n[0]}</span><span class="muted">${n[1]}</span></div>`).join("")}</section><section class="panel space"><div class="kicker">Recommended next step</div><h3>Complete one focused mix revision before mastering.</h3><p class="section-copy">Prioritise contrast, low-mid separation and the final vocal lift. Do not add more production layers until those three decisions are resolved.</p></section></div><aside><section class="panel"><h3>Scores breakdown</h3>${[["Songwriting",84],["Vocal",88],["Production",85],["Mix",82],["Master",78],["Artist Identity",89],["Commercial Potential",91]].map(s=>`<div class="score-row"><div class="score-label"><span>${s[0]}</span><b>${s[1]/10}</b></div><div class="bar"><i style="width:${s[1]}%"></i></div></div>`).join("")}</section><section class="panel space"><h3>Three priority improvements</h3><ul class="features"><li>Create more verse-to-chorus contrast</li><li>Carve 250-350 Hz before mastering</li><li>Add one distinctive final ad-lib</li></ul></section><section class="notice space">This private report provides professional opinion and development guidance. It does not guarantee a signing, collaboration, placement or introduction.</section></aside></div></div></main></div>`}
    function showPage(name){window.scrollTo(0,0);if(name==='landing')app.innerHTML=landing();if(name==='upload')app.innerHTML=upload();if(name==='experts')app.innerHTML=experts();if(name==='payment')app.innerHTML=payment();if(name==='dashboard')app.innerHTML=dashboard();if(name==='reviewer')app.innerHTML=reviewerDashboard();if(name==='report')app.innerHTML=report()}
    function selectExpert(name){selectedReviewer=reviewers.find(r=>r.name===name)||reviewers[0];showPage('payment')}
    function selectFeedback(type){selectedFeedback=type;showPage('payment')}
    function renderExperts(role){app.innerHTML=experts(role)}
    function choose(el){el.parentElement.querySelectorAll('.choice').forEach(x=>x.classList.remove('active'));el.classList.add('active')}
    function toggleMenu(){document.getElementById('mobileMenu')?.classList.toggle('open')}
    function scrollToId(id){if(!document.getElementById(id)){showPage('landing');setTimeout(()=>document.getElementById(id)?.scrollIntoView({behavior:'smooth'}),50)}else document.getElementById(id).scrollIntoView({behavior:'smooth'});document.getElementById('mobileMenu')?.classList.remove('open')}
    showPage('landing');
  </script>
</body>
</html>
