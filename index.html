<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#07060a">
  <title>A&amp;R ROOM&trade; - Your Music. Industry Ears.</title>
  <style>
    :root{--bg:#07060a;--panel:#100d16;--soft:#18131f;--line:rgba(255,255,255,.09);--muted:rgba(255,255,255,.46);--pink:#ec4899;--violet:#8b5cf6;--green:#6ee7b7;--amber:#fcd34d;--radius:24px}
    *{box-sizing:border-box}html{scroll-behavior:smooth;background:var(--bg)}body{margin:0;color:#fff;background:radial-gradient(circle at 20% 0,rgba(236,72,153,.09),transparent 28%),var(--bg);font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}button,input,select,textarea{font:inherit}button{cursor:pointer}.hidden{display:none!important}.wrap{width:min(1180px,calc(100% - 40px));margin:auto}.muted{color:var(--muted)}
    .logo{display:flex;align-items:center;gap:12px;color:#fff;text-decoration:none}.logo-mark{width:38px;height:38px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(135deg,rgba(236,72,153,.45),rgba(139,92,246,.12));display:flex;align-items:center;justify-content:center;gap:2px}.logo-mark i{display:block;width:2px;background:#fff;border-radius:9px}.logo-mark i:nth-child(1){height:8px}.logo-mark i:nth-child(2){height:16px}.logo-mark i:nth-child(3){height:11px}.logo-mark i:nth-child(4){height:20px}.logo-mark i:nth-child(5){height:13px}.logo-name,.logo-tag{display:block}.logo-name{font-size:13px;font-weight:900;letter-spacing:.16em}.logo-tag{margin-top:3px;font-size:8px;text-transform:uppercase;letter-spacing:.2em;color:rgba(255,255,255,.32)}
    .site-header{position:fixed;z-index:50;top:16px;left:0;right:0}.nav-shell{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1px solid var(--line);border-radius:18px;background:rgba(8,6,12,.79);backdrop-filter:blur(18px);box-shadow:0 20px 50px rgba(0,0,0,.3)}.nav-links{display:flex;gap:28px;align-items:center}.nav-links button,.text-btn{border:0;background:none;color:rgba(255,255,255,.52);font-size:13px}.nav-links button:hover,.text-btn:hover{color:#fff}.nav-actions{display:flex;gap:8px}.menu-btn{display:none;width:42px;height:42px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.04);color:#fff}.mobile-menu{display:none;margin-top:8px;padding:10px;border:1px solid var(--line);border-radius:16px;background:#100d16}.mobile-menu.open{display:grid;gap:6px}.mobile-menu button{padding:12px;border:0;border-radius:10px;background:transparent;color:rgba(255,255,255,.7);text-align:left}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:13px 20px;border-radius:999px;border:1px solid transparent;font-weight:800;font-size:13px;transition:.2s transform,.2s box-shadow,.2s border-color}.btn:hover{transform:translateY(-2px)}.btn-primary{background:#fff;color:#09070d;box-shadow:0 0 34px rgba(236,72,153,.2)}.btn-primary:hover{box-shadow:0 0 42px rgba(236,72,153,.4)}.btn-secondary{border-color:var(--line);background:rgba(255,255,255,.05);color:#fff}.btn-secondary:hover{border-color:rgba(236,72,153,.38)}

    .player-card{position:relative;margin-left:auto;width:min(100%,430px);padding:24px;border:1px solid var(--line);border-radius:30px;background:rgba(10,8,14,.72);backdrop-filter:blur(18px);box-shadow:0 30px 90px rgba(0,0,0,.55);animation:float 5s ease-in-out infinite}@keyframes float{50%{transform:translateY(-10px)}}.player-top{display:flex;justify-content:space-between;align-items:center}.player-title{font-weight:800;font-size:13px}.small{font-size:10px;color:rgba(255,255,255,.32);margin-top:5px}.play{width:42px;height:42px;border:0;border-radius:50%;background:#fff;color:#000;font-size:15px}.wave{display:flex;align-items:center;gap:3px;height:78px;margin:14px 0}.wave i{flex:1;max-width:5px;min-width:2px;border-radius:9px;background:linear-gradient(#f9a8d4,var(--pink),var(--violet));animation:wave 1.1s ease-in-out infinite alternate}.wave i:nth-child(3n){animation-delay:-.4s}.wave i:nth-child(4n){animation-delay:-.7s}@keyframes wave{from{height:18%}to{height:85%}}.score-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.score-mini div{padding:14px;border-radius:14px;background:rgba(255,255,255,.045)}.score-mini b{font-size:20px}.score-mini span{display:block;margin-top:4px;font-size:9px;color:rgba(255,255,255,.32)}
    .section{padding:120px 0}.section.alt{border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:rgba(255,255,255,.015)}.section-head{max-width:680px}.section-head.center{text-align:center;margin:auto}.kicker{font-size:10px;font-weight:900;letter-spacing:.22em;text-transform:uppercase;color:#f472b6}.section h2{font-size:clamp(36px,5vw,54px);line-height:1.06;letter-spacing:-.045em;margin:18px 0}.section-copy{font-size:16px;line-height:1.7;color:var(--muted)}.grid-4,.grid-3,.grid-2{display:grid;gap:16px;margin-top:56px}.grid-4{grid-template-columns:repeat(4,1fr)}.grid-3{grid-template-columns:repeat(3,1fr)}.grid-2{grid-template-columns:repeat(2,1fr)}.card{position:relative;padding:26px;border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,255,255,.026);transition:.25s}.card:hover{transform:translateY(-6px);border-color:rgba(236,72,153,.28);background:rgba(255,255,255,.04)}.step-no{font-family:monospace;font-size:10px;letter-spacing:.2em;color:rgba(255,255,255,.25)}.icon-box{width:48px;height:48px;border:1px solid rgba(236,72,153,.22);border-radius:15px;background:rgba(236,72,153,.1);display:grid;place-items:center;color:#f9a8d4;font-weight:900}.card h3{margin:22px 0 9px;font-size:19px}.card p{font-size:13px;line-height:1.7;color:rgba(255,255,255,.4)}
    .reviewer-top{display:flex;justify-content:space-between;align-items:start}.reviewer-avatar{width:72px;height:72px;border-radius:50%;display:grid;place-items:center;font-weight:900;font-size:18px;background:linear-gradient(135deg,var(--pink),var(--violet));box-shadow:inset 0 0 0 1px rgba(255,255,255,.2)}.rating{padding:6px 9px;border:1px solid var(--line);border-radius:999px;font-size:10px;color:rgba(255,255,255,.64)}.role{font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:#f9a8d4}.tags{display:flex;flex-wrap:wrap;gap:6px;margin:17px 0}.tag{padding:6px 9px;border:1px solid var(--line);border-radius:999px;font-size:9px;color:rgba(255,255,255,.45)}.review-meta{display:flex;justify-content:space-between;align-items:end;padding-top:18px;border-top:1px solid var(--line)}.price{font-size:23px;font-weight:900}.price small{display:block;margin-bottom:4px;font-size:9px;font-weight:500;color:rgba(255,255,255,.3)}
    .price-card.featured{border-color:rgba(236,72,153,.35);background:linear-gradient(180deg,rgba(236,72,153,.1),rgba(255,255,255,.025));box-shadow:0 0 70px rgba(236,72,153,.07)}.price-value{font-size:42px;font-weight:900;margin:25px 0}.features{padding:20px 0 0;border-top:1px solid var(--line);list-style:none}.features li{margin:14px 0;font-size:13px;color:rgba(255,255,255,.54)}.features li:before{content:"OK";display:inline-grid;place-items:center;width:20px;height:20px;margin-right:10px;border-radius:50%;background:rgba(236,72,153,.1);color:#f9a8d4;font-size:7px;font-weight:900}.cta{padding:70px 30px;text-align:center;border:1px solid rgba(236,72,153,.25);border-radius:36px;background:linear-gradient(135deg,rgba(236,72,153,.14),rgba(139,92,246,.06),transparent)}footer{padding:32px 0;border-top:1px solid var(--line)}.footer-row{display:flex;justify-content:space-between;align-items:center;gap:30px}.footer-note{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:rgba(255,255,255,.25)}
    .app-top{padding:18px 0;border-bottom:1px solid var(--line)}.app-top .wrap{display:flex;justify-content:space-between;align-items:center}.back{border:0;background:transparent;color:rgba(255,255,255,.45)}.app-main{padding:48px 0 80px}.app-title{font-size:clamp(36px,5vw,58px);letter-spacing:-.05em;margin:12px 0}.form-layout,.checkout-layout,.report-layout,.review-layout{display:grid;gap:26px;margin-top:40px}.form-layout{grid-template-columns:1fr 360px}.checkout-layout,.report-layout{grid-template-columns:1fr 390px}.review-layout{grid-template-columns:320px 1fr}.panel{padding:26px;border:1px solid var(--line);border-radius:26px;background:rgba(255,255,255,.025)}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.field-label{display:block;margin-bottom:9px;font-size:11px;font-weight:800;color:rgba(255,255,255,.62)}.field{width:100%;padding:15px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.025);color:#fff;outline:none}.field:focus{border-color:rgba(236,72,153,.45);box-shadow:0 0 0 4px rgba(236,72,153,.06)}select.field option{background:#15111b}.drop{min-height:170px;display:grid;place-items:center;text-align:center;border:1px dashed rgba(255,255,255,.18);border-radius:22px;background:rgba(255,255,255,.018)}.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.choice{padding:14px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.025);color:rgba(255,255,255,.5);text-align:left}.choice.active{border-color:rgba(236,72,153,.4);background:rgba(236,72,153,.09);color:#fff}.space{margin-top:22px}.filters{display:flex;gap:8px;overflow:auto;margin:30px 0 0}.filter{flex:none;padding:10px 15px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.025);color:rgba(255,255,255,.45)}.filter.active{background:#fff;color:#000}.status{display:inline-block;padding:6px 9px;border-radius:999px;font-size:8px;font-weight:900;letter-spacing:.1em;text-transform:uppercase}.completed{background:rgba(52,211,153,.1);color:var(--green)}.reviewing{background:rgba(139,92,246,.12);color:#c4b5fd}.pending{background:rgba(251,191,36,.1);color:var(--amber)}.draft{background:rgba(255,255,255,.06);color:rgba(255,255,255,.45)}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:30px 0}.stat{padding:19px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.025)}.stat b{font-size:26px}.stat span{display:block;margin-top:5px;font-size:10px;color:rgba(255,255,255,.34)}.track-actions{display:flex;justify-content:space-between;align-items:end;margin-top:20px;padding-top:16px;border-top:1px solid var(--line)}.summary-row{display:flex;justify-content:space-between;gap:15px;padding:12px 0;font-size:12px}.summary-row span:first-child{color:rgba(255,255,255,.35)}.total{margin-top:14px;padding-top:18px;border-top:1px solid var(--line);font-size:20px;font-weight:900}.queue-item{padding:16px;border:1px solid transparent;border-radius:17px;background:rgba(255,255,255,.025);margin-top:9px}.queue-item.active{border-color:rgba(236,72,153,.3);background:rgba(236,72,153,.08)}.score-row{margin-top:18px}.score-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:8px}.bar{height:6px;border-radius:9px;background:rgba(255,255,255,.06);overflow:hidden}.bar i{display:block;height:100%;border-radius:9px;background:linear-gradient(90deg,var(--pink),var(--violet))}.time-note{display:flex;gap:14px;padding:15px;border-radius:16px}.time-note:hover{background:rgba(255,255,255,.035)}.time{height:max-content;padding:6px 9px;border-radius:8px;background:rgba(236,72,153,.1);color:#f9a8d4;font:10px monospace}.overall{font-size:76px;line-height:1;font-weight:900;letter-spacing:-.07em}
    @media(max-width:900px){.nav-links,.nav-actions{display:none}.menu-btn{display:block}.hero{min-height:auto;padding:140px 0 90px}.hero-grid{grid-template-columns:1fr}.hero-art{display:none}.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr}.form-layout,.checkout-layout,.report-layout,.review-layout{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:600px){.wrap{width:min(100% - 28px,1180px)}.logo-tag{display:none}.logo-name{font-size:11px}.hero{padding-top:125px}.hero-bg{background-image:linear-gradient(180deg,rgba(7,6,10,.28),#07060a 86%),url("assets/ar-room-studio.png");background-position:62% center}h1{font-size:53px}.lead{font-size:15px}.hero-actions{flex-direction:column}.hero-actions .btn{width:100%}.trust{align-items:flex-start}.section{padding:86px 0}.grid-4,.grid-2{grid-template-columns:1fr}.form-grid,.choice-grid{grid-template-columns:1fr}.footer-row{flex-direction:column;text-align:center}.stats{grid-template-columns:1fr 1fr}.app-main{padding-top:34px}.panel{padding:19px}.overall{font-size:60px}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const reviewers=[
      {name:"Mumzy Stranger",initials:"MS",role:"Artist",genres:["R&B","Pop","Urban Desi"],price:89,rating:4.9,turn:"3-5 days"},
      {name:"Rishi Rich",initials:"RR",role:"Producer",genres:["R&B","Bhangra","Pop"],price:119,rating:5.0,turn:"5-7 days"},
      {name:"Dr Zeus",initials:"DZ",role:"Producer",genres:["Bhangra","Hip-Hop","Fusion"],price:109,rating:4.9,turn:"4-6 days"},
      {name:"PBN",initials:"PBN",role:"Producer",genres:["Bhangra","Dance","Punjabi"],price:79,rating:4.8,turn:"3-5 days"},
      {name:"DJ Lyan",initials:"DL",role:"DJ",genres:["Club","Afrobeats","Desi"],price:59,rating:4.8,turn:"2-4 days"},
      {name:"Roach Killa",initials:"RK",role:"Artist",genres:["Dancehall","Reggae","Urban"],price:69,rating:4.9,turn:"3-5 days"}
    ];
    const tracks=[
      {title:"Midnight Rani",genre:"Urban Desi",status:"Completed",reviewer:"Mumzy Stranger",action:"View feedback"},
      {title:"Tere Naal Again",genre:"R&B / Pop",status:"In Review",reviewer:"Rishi Rich",action:"Continue"},
      {title:"Brown Frequency",genre:"Bhangra",status:"Pending Payment",reviewer:"PBN",action:"Pay now"},
      {title:"Voice Note 07",genre:"Pop",status:"Draft",reviewer:"Not selected",action:"Continue"}
    ];
    let selectedReviewer=reviewers[0];
    const app=document.getElementById("app");
    function logo(){return `<span class="logo"><span class="logo-mark"><i></i><i></i><i></i><i></i><i></i></span><span><span class="logo-name">A&amp;R ROOM&trade;</span><span class="logo-tag">Your music. Industry ears.</span></span></span>`}
    function wave(count=42){return `<div class="wave">${Array.from({length:count},(_,i)=>`<i style="height:${18+(i*19)%58}%"></i>`).join("")}</div>`}
    function reviewerCard(r,select=false){return `<article class="card reviewer-card" data-role="${r.role}"><div class="reviewer-top"><div class="reviewer-avatar">${r.initials}</div><span class="rating">&#9733; ${r.rating.toFixed(1)}</span></div><h3>${r.name}</h3><div class="role">${r.role}</div><div class="tags">${r.genres.map(g=>`<span class="tag">${g}</span>`).join("")}</div><div class="review-meta"><div class="price"><small>From</small>&pound;${r.price}</div><button class="btn btn-primary" onclick="selectExpert('${r.name.replaceAll("'","\\'")}')">${select?"Select":"View profile"} &rarr;</button></div></article>`}
    function header(){return `<header class="site-header"><div class="wrap"><div class="nav-shell"><button class="text-btn" onclick="showPage('landing')">${logo()}</button><nav class="nav-links"><button onclick="scrollToId('how')">How it works</button><button onclick="scrollToId('experts')">Experts</button><button onclick="scrollToId('pricing')">Feedback types</button><button onclick="showPage('reviewer')">For reviewers</button></nav><div class="nav-actions"><button class="btn btn-secondary" onclick="showPage('dashboard')">Dashboard</button><button class="btn btn-primary" onclick="showPage('upload')">Submit a track &rarr;</button></div><button class="menu-btn" aria-label="Menu" onclick="toggleMenu()">MENU</button></div><div id="mobileMenu" class="mobile-menu"><button onclick="scrollToId('how')">How it works</button><button onclick="scrollToId('experts')">Experts</button><button onclick="scrollToId('pricing')">Feedback types</button><button onclick="showPage('reviewer')">For reviewers</button><button onclick="showPage('dashboard')">Artist dashboard</button><button onclick="showPage('upload')">Submit a track</button></div></div></header>`}
    function landing(){return `<div class="page">${header()}<section class="hero"><div class="hero-bg"></div><div class="wrap hero-grid"><div><span class="eyebrow">Your music. Industry ears.</span><h1>Get your music heard by <span class="gradient">the best.</span></h1><p class="lead">Submit your track and receive professional feedback from established South Asian artists, producers and engineers.</p><div class="hero-actions"><button class="btn btn-primary" onclick="showPage('upload')">Upload your track &rarr;</button><button class="btn btn-secondary" onclick="scrollToId('how')">How it works</button></div><div class="trust"><div class="avatars">${reviewers.slice(0,4).map(r=>`<span class="avatar">${r.initials}</span>`).join("")}</div><div><div class="stars">&#9733;&#9733;&#9733;&#9733;&#9733;</div><p>Trusted by independent artists, singers, producers and creators.</p></div></div></div><div class="hero-art"><div class="player-card"><div class="player-top"><div><div class="player-title">Midnight Rani.wav</div><div class="small">Master - 24-bit - 44.1 kHz</div></div><button class="play" onclick="this.textContent=this.textContent==='PLAY'?'STOP':'PLAY'">PLAY</button></div>${wave()}<div class="score-mini"><div><b>8.8</b><span>Vocal</span></div><div><b>8.2</b><span>Mix</span></div><div><b>9.1</b><span>Potential</span></div></div></div></div></div></section>
      <section id="how" class="section"><div class="wrap"><div class="section-head center"><div class="kicker">A direct line to better records</div><h2>Four steps. No gatekeeping.</h2><p class="section-copy">Professional perspective, delivered clearly enough to turn into your next move.</p></div><div class="grid-4">${[["01","Submit","Send your finished track or work in progress."],["02","Select Expert","Choose the right industry ear for your sound."],["03","Receive Feedback","Get direct, practical notes in your chosen format."],["04","Improve Your Sound","Apply the notes and return with a stronger record."]].map(x=>`<article class="card"><div class="icon-box">${x[0]}</div><div class="step-no">STEP ${x[0]}</div><h3>${x[1]}</h3><p>${x[2]}</p></article>`).join("")}</div></div></section>
      <section id="experts" class="section alt"><div class="wrap"><div class="section-head"><div class="kicker">Inside the room</div><h2>Feedback from people who know the record.</h2><p class="section-copy">Choose the perspective that matches your sound and the decision you need to make next.</p></div><div class="grid-3">${reviewers.slice(0,3).map(r=>reviewerCard(r)).join("")}</div><div style="margin-top:28px;text-align:right"><button class="btn btn-secondary" onclick="showPage('experts')">Meet all experts &rarr;</button></div></div></section>
      <section id="pricing" class="section"><div class="wrap"><div class="section-head center"><div class="kicker">Choose your depth</div><h2>Clear feedback. Your preferred format.</h2><p class="section-copy">Prices vary by expert. Start with the level of detail your track needs today.</p></div><div class="grid-3">${[["Written Feedback",39,"Focused notes you can revisit while you work.",["Detailed review","Score breakdown","Timestamped notes"]],["Voice Feedback",69,"Hear the nuance and instinct behind the notes.",["Everything in Written","Personal voice note","More creative context"]],["Video Feedback",99,"A complete screen-recorded review of your track.",["Everything in Voice","Visual walkthrough","Deep-dive analysis"]]].map((p,i)=>`<article class="card price-card ${i===1?"featured":""}"><div class="icon-box">0${i+1}</div><h3>${p[0]}</h3><p>${p[2]}</p><div class="price-value"><span class="small">From </span>&pound;${p[1]}</div><ul class="features">${p[3].map(f=>`<li>${f}</li>`).join("")}</ul><button class="btn ${i===1?"btn-primary":"btn-secondary"}" style="width:100%;margin-top:18px" onclick="showPage('upload')">Choose this format</button></article>`).join("")}</div></div></section>
      <section class="section" style="padding-top:20px"><div class="wrap cta"><div class="kicker">Ready when you are</div><h2>Your next version starts with better ears.</h2><p class="section-copy">Bring the track. Choose the perspective. Leave knowing exactly what to do next.</p><button class="btn btn-primary" onclick="showPage('upload')">Submit your track &rarr;</button></div></section><footer><div class="wrap footer-row">${logo()}<div class="footer-note">Static mock experience - no payments or uploads are processed</div></div></footer></div>`}
    function appTop(title){return `<div class="app-top"><div class="wrap"><button class="back" onclick="showPage('landing')">&larr; Home</button><strong>${title}</strong><span></span></div></div>`}
    function upload(){return `<div class="page">${appTop("Submit a track")}<main class="app-main"><div class="wrap"><div class="kicker">Step 01</div><h1 class="app-title">Tell us about the track.</h1><p class="section-copy">Give your reviewer the context they need to listen with purpose.</p><div class="form-layout"><form class="panel" onsubmit="event.preventDefault();showPage('experts')"><div class="form-grid"><label><span class="field-label">Song title</span><input class="field" value="Midnight Rani" required></label><label><span class="field-label">Artist name</span><input class="field" value="Jay Kaden" required></label></div><label class="space" style="display:block"><span class="field-label">Genre</span><select class="field"><option>Urban Desi</option><option>R&B</option><option>Pop</option><option>Bhangra</option><option>Hip-Hop</option></select></label><div class="space"><span class="field-label">Upload MP3 or WAV</span><label class="drop"><input type="file" accept="audio/*" hidden onchange="document.getElementById('fileName').textContent=this.files[0]?.name||'Drop your track here'"><span><b id="fileName">Drop your track here</b><br><span class="small">Click to browse - demo only</span></span></label></div><div class="space"><span class="field-label">What feedback do you want?</span><div class="choice-grid">${["Overall creative direction","Mix and master","Vocals and performance","Commercial potential"].map((c,i)=>`<button type="button" class="choice ${i===0?"active":""}" onclick="choose(this)">${c}</button>`).join("")}</div></div><label class="space" style="display:block"><span class="field-label">Notes to reviewer</span><textarea class="field" rows="5" placeholder="What decisions are you stuck on?"></textarea></label><button class="btn btn-primary space" type="submit">Continue to choose reviewer &rarr;</button></form><aside class="panel"><div class="icon-box">TIP</div><h3>Give them a useful brief.</h3><p class="section-copy" style="font-size:13px">Tell the reviewer what you are deciding, not just whether you think the track is good.</p><ul class="features"><li>Mention reference tracks</li><li>Share the production stage</li><li>Name the decisions you are stuck on</li></ul></aside></div></div></main></div>`}
    function experts(filter="All"){let list=filter==="All"?reviewers:reviewers.filter(r=>r.role===filter);return `<div class="page">${appTop("Select expert")}<main class="app-main"><div class="wrap"><div class="kicker">Step 02</div><h1 class="app-title">Choose the right ears.</h1><p class="section-copy">Every expert brings a different instinct. Choose the perspective closest to your next decision.</p><div class="filters">${["All","Producer","Artist","DJ"].map(f=>`<button class="filter ${filter===f?"active":""}" onclick="renderExperts('${f}')">${f==='All'?'All':f+'s'}</button>`).join("")}</div><div class="grid-3">${list.map(r=>reviewerCard(r,true)).join("")}</div></div></main></div>`}
    function payment(){let total=selectedReviewer.price+30;return `<div class="page">${appTop("Review order")}<main class="app-main"><div class="wrap"><div class="kicker">Final step</div><h1 class="app-title">Review your order.</h1><p class="section-copy">This checkout is a visual demo only.</p><div class="checkout-layout"><section class="panel"><h3>Choose feedback type</h3>${[["Written Feedback","Detailed notes and timestamps","Included"],["Voice Feedback","Written report plus a voice note","+ &pound;30"],["Video Feedback","Complete screen-recorded review","+ &pound;60"]].map((x,i)=>`<button class="choice ${i===1?"active":""}" style="width:100%;margin-top:10px"><b>${x[0]}</b><span class="small" style="display:block">${x[1]} - ${x[2]}</span></button>`).join("")}</section><aside class="panel"><div style="display:flex;gap:14px;align-items:center"><div class="reviewer-avatar" style="width:52px;height:52px;font-size:13px">${selectedReviewer.initials}</div><div><b>${selectedReviewer.name}</b><div class="role">${selectedReviewer.role}</div></div></div><div class="space"><div class="summary-row"><span>Track title</span><b>Midnight Rani</b></div><div class="summary-row"><span>Artist</span><b>Jay Kaden</b></div><div class="summary-row"><span>Review type</span><b>Voice Feedback</b></div><div class="summary-row"><span>Turnaround</span><b>${selectedReviewer.turn}</b></div><div class="summary-row"><span>Expert review</span><b>&pound;${selectedReviewer.price}.00</b></div><div class="summary-row"><span>Format upgrade</span><b>&pound;30.00</b></div><div class="summary-row total"><span>Total</span><b>&pound;${total}.00</b></div></div><button class="btn btn-primary" style="width:100%;margin-top:20px" onclick="showPage('dashboard')">Secure checkout</button><p class="small" style="text-align:center">Demo only - no payment will be taken.</p></aside></div></div></main></div>`}
    function dashboard(){return `<div class="page">${appTop("Artist dashboard")}<main class="app-main"><div class="wrap"><div style="display:flex;justify-content:space-between;align-items:end;gap:20px"><div><div class="kicker">Saturday, 13 June</div><h1 class="app-title">Welcome back, Jay.</h1><p class="section-copy">Your next breakthrough might be one honest note away.</p></div><button class="btn btn-primary" onclick="showPage('upload')">Upload new track</button></div><div class="stats"><div class="stat"><b>2</b><span>Active reviews</span></div><div class="stat"><b>8</b><span>Completed</span></div><div class="stat"><b>8.6</b><span>Average score</span></div><div class="stat"><b>2 new</b><span>Messages</span></div></div><h2 style="font-size:24px">Your tracks</h2><div class="grid-2" style="margin-top:20px">${tracks.map(t=>`<article class="card"><div class="icon-box">MIX</div><h3>${t.title}</h3><p>${t.genre} - 03:26</p><span class="status ${t.status==='Completed'?'completed':t.status==='In Review'?'reviewing':t.status==='Pending Payment'?'pending':'draft'}">${t.status}</span><div class="track-actions"><div><span class="small">Reviewer</span><br><b style="font-size:12px">${t.reviewer}</b></div><button class="btn btn-secondary" onclick="${t.status==='Completed'?"showPage('report')":t.status==='Pending Payment'?"showPage('payment')":"showPage('upload')"}">${t.action}</button></div>${t.status==='Completed'?`<button class="choice" style="width:100%;margin-top:12px;text-align:center" onclick="showPage('upload')">Re-upload revised mix</button>`:""}</article>`).join("")}</div></div></main></div>`}
    function reviewerDashboard(){return `<div class="page">${appTop("Reviewer workspace")}<main class="app-main"><div class="wrap"><div class="kicker">Reviewer workspace</div><h1 class="app-title">Good afternoon, Mumzy.</h1><p class="section-copy">Four artists are waiting for your ears.</p><div class="stats"><div class="stat"><b>04</b><span>Pending tracks</span></div><div class="stat"><b>02</b><span>In progress</span></div><div class="stat"><b>18</b><span>Completed this month</span></div></div><div class="review-layout"><aside class="panel"><h3>Review queue</h3>${tracks.slice(0,3).map((t,i)=>`<div class="queue-item ${i===0?"active":""}"><b style="font-size:12px">${t.title}</b><div class="small">Jay Kaden - ${t.genre}</div></div>`).join("")}</aside><section class="panel"><span class="status reviewing">In progress</span><h2 style="font-size:27px">Midnight Rani</h2><p class="small">Jay Kaden - Urban Desi - Video feedback</p>${wave(55)}<div class="grid-2" style="margin-top:20px"><div><h3>Score the record</h3>${[["Vocal",80],["Mix",80],["Master",70],["Commercial Potential",90]].map(s=>`<div class="score-row"><div class="score-label"><span>${s[0]}</span><b>${s[1]/10}.0</b></div><div class="bar"><i style="width:${s[1]}%"></i></div></div>`).join("")}</div><div><h3>Written feedback</h3><textarea class="field" rows="8">The core of this record is strong. Your hook is memorable and the vocal tone feels distinctive. Focus the next pass on creating more contrast between the verse and chorus.</textarea><button class="btn btn-primary space" onclick="showPage('report')">Submit review</button></div></div></section></div></div></main></div>`}
    function report(){let notes=[["00:18","Bring the first vocal phrase forward by around 1 dB."],["00:47","Strong hook. Open the dhol layer wider here."],["01:36","Carve a little low mid between the bass and keys."],["02:42","Add one fresh ad-lib in the final chorus."]];return `<div class="page">${appTop("Feedback report")}<main class="app-main"><div class="wrap"><div class="kicker">Review completed</div><div style="display:flex;justify-content:space-between;align-items:end;gap:20px"><div><h1 class="app-title">Your feedback is in.</h1><p class="section-copy">Midnight Rani - Reviewed 11 June 2026</p></div><button class="btn btn-primary" onclick="showPage('upload')">Upload new version</button></div><div class="report-layout"><div><section class="panel" style="background:linear-gradient(135deg,rgba(236,72,153,.1),rgba(139,92,246,.04))"><div class="kicker">Overall score</div><div class="overall">8.6</div><p class="section-copy">A distinctive, commercially promising record with a memorable hook and a few focused mix decisions left to make.</p></section><section class="panel space"><h2 style="font-size:23px">Written feedback</h2><p class="section-copy">The core of this record is strong. The hook is memorable after one listen and your vocal tone gives it a clear identity. The South Asian elements feel integrated into the production rather than added on top.</p><p class="section-copy">For the next mix, create more contrast between the verse and chorus. A slightly drier, narrower verse would make the hook feel bigger without adding more layers.</p></section><section class="panel space"><h2 style="font-size:23px">Timestamped notes</h2>${notes.map(n=>`<div class="time-note"><span class="time">${n[0]}</span><span class="muted">${n[1]}</span></div>`).join("")}</section></div><aside><section class="panel"><h3>Scores breakdown</h3>${[["Vocal",88],["Mix",82],["Master",78],["Commercial Potential",91]].map(s=>`<div class="score-row"><div class="score-label"><span>${s[0]}</span><b>${s[1]/10}</b></div><div class="bar"><i style="width:${s[1]}%"></i></div></div>`).join("")}</section><section class="panel space"><h3>Suggested improvements</h3><ul class="features"><li>Create more chorus contrast</li><li>Carve 250-350 Hz</li><li>Add one final ad-lib</li><li>Reference on phone speakers</li></ul></section></aside></div></div></main></div>`}
    function showPage(name){window.scrollTo(0,0);if(name==='landing')app.innerHTML=landing();if(name==='upload')app.innerHTML=upload();if(name==='experts')app.innerHTML=experts();if(name==='payment')app.innerHTML=payment();if(name==='dashboard')app.innerHTML=dashboard();if(name==='reviewer')app.innerHTML=reviewerDashboard();if(name==='report')app.innerHTML=report()}
    function selectExpert(name){selectedReviewer=reviewers.find(r=>r.name===name)||reviewers[0];showPage('payment')}
    function renderExperts(role){app.innerHTML=experts(role)}
    function choose(el){el.parentElement.querySelectorAll('.choice').forEach(x=>x.classList.remove('active'));el.classList.add('active')}
    function toggleMenu(){document.getElementById('mobileMenu')?.classList.toggle('open')}
    function scrollToId(id){if(!document.getElementById(id)){showPage('landing');setTimeout(()=>document.getElementById(id)?.scrollIntoView({behavior:'smooth'}),50)}else document.getElementById(id).scrollIntoView({behavior:'smooth'});document.getElementById('mobileMenu')?.classList.remove('open')}
    showPage('landing');
  </script>
</body>
</html>
